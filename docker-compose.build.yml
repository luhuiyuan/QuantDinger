# Override file for local low-memory source builds and host PostgreSQL.
# Usage:
#   git clone <QuantDinger-Vue> ./QuantDinger-Vue
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# Without this override, the main compose file only pulls the prebuilt
# frontend image from GHCR and never touches ./QuantDinger-Vue/.
#
# Tip: set `COMPOSE_FILE=docker-compose.yml:docker-compose.build.yml` in your
# root `.env` to make `docker compose up --build` pick this up automatically.

x-host-postgres-runtime: &host-postgres-runtime
  env_file:
    - ./backend_api_python/.env
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  postgres:
    # This server uses its already-installed PostgreSQL. The container remains
    # available only when explicitly enabled with --profile container-postgres.
    profiles: ["container-postgres"]

  migration:
    <<: *host-postgres-runtime
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  backend:
    <<: *host-postgres-runtime
    build:
      args:
        INSTALL_LOCAL_EASY_TDX: ${INSTALL_LOCAL_EASY_TDX:-1}
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  trading-worker:
    <<: *host-postgres-runtime
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  scheduler-worker:
    <<: *host-postgres-runtime
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  celery-worker:
    <<: *host-postgres-runtime
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  celery-beat:
    <<: *host-postgres-runtime
    environment:
      DATABASE_URL: !reset null
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  frontend:
    # Disable the `pull_policy: always` inherited from docker-compose.yml.
    # Without this, a plain `docker compose up` (or `pull frontend`) would
    # silently overwrite the locally-built image with the GHCR `:latest`,
    # discarding the user's local Vue edits.
    pull_policy: build
    build:
      context: ${FRONTEND_SRC_PATH:-./QuantDinger-Vue}
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        GIT_TAG: ${GIT_TAG:-${FRONTEND_TAG:-${IMAGE_TAG:-}}}
        NODE_OPTIONS: ${BUILD_NODE_OPTIONS:---max-old-space-size=1536}
        NPM_CONFIG_JOBS: ${BUILD_NPM_JOBS:-1}
